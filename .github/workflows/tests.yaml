name: Run Donobu Flows

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 12 * * *' # Runs daily at 12:00 UTC
  workflow_dispatch:

jobs:
  run-donobu-flows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6

      - name: Install Dependencies
        run: npm ci && npx playwright install --with-deps

      - name: Run Playwright Tests
        id: run_tests
        continue-on-error: true
        env:
          DONOBU_API_KEY: ${{ secrets.DONOBU_API_KEY }}
          DONOBU_SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DONOBU_REPORT_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: npx donobu test --auto-heal

      - name: Save Test Reports as Artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 3

      - name: Publish the HTML report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./test-results

      # Create a self-healing PR only when this workflow was not triggered by a pull-request.
      - name: Create Pull Request for Test Fixes (if any)
        if: ${{ github.event_name != 'pull_request' }}
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'Fix failing Playwright tests'
          title: '[Fixed] Playwright tests'
          body: 'Fix failing Playwright tests'
          branch: fix-playwright-tests-for-${{ github.ref_name }}
          base: ${{ github.ref_name }}
